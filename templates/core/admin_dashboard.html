<!-- templates/core/admin_dashboard.html -->
{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Панель администратора</h2>
    
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Товары</h5>
                    <p class="card-text">Управление каталогом товаров</p>
                    <a href="{% url 'admin:catalog_product_changelist' %}" class="btn btn-primary">

                    </a>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">

                <div class="card-body">

                    <a href="{% url 'admin:accounts_customuser_changelist' %}" class="btn btn-primary">

                    </a>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Корзины</h5>
                    <p class="card-text">Просмотр корзин</p>
                    <a href="{% url 'admin:cart_cartitem_changelist' %}" class="btn btn-primary">
