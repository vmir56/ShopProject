<!-- templates/accounts/password_recover.html -->
{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>Восстановление пароля</h4>
                </div>
                <div class="card-body">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                            <div class="form-text">Введите email, указанный при регистрации</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Отправить инструкции</button>
                    </form>
                    
                    <hr>
                    <p class="text-center mb-0">
                        <a href="{% url 'accounts:login' %}">Вернуться к входу</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
